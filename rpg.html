<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>會考成語勇者傳說</title>
<style>
:root{--night:#10182e;--panel:#17233e;--gold:#ffd166;--orange:#ff7b46;--mint:#55d6a8;--red:#ff5d6c;--ink:#f7f2de;--muted:#9dadc9}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#0b1224;color:var(--ink);font-family:"Microsoft JhengHei",sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 15%,#314879 0,transparent 35%),linear-gradient(#0e1830cc,#090f20);z-index:-2}.stars{position:fixed;inset:0;z-index:-1;opacity:.5;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:43px 43px}.app{max-width:1120px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.logo{display:flex;align-items:center;gap:12px}.crest{width:52px;height:52px;display:grid;place-items:center;background:linear-gradient(145deg,#ffbc50,#ff7045);border:3px solid #ffeaa7;border-radius:15px;box-shadow:0 0 24px #ff9a4466;font-size:26px}.logo h1{margin:0;font-size:24px}.logo small{color:var(--muted)}button,select,input{font:inherit}.icon-btn{border:1px solid #ffffff20;background:#ffffff0d;color:white;padding:10px 14px;border-radius:12px;cursor:pointer}.screen{display:none}.screen.show{display:block}.card{background:linear-gradient(145deg,#1b2948ed,#121d35ed);border:1px solid #ffffff18;border-radius:25px;box-shadow:0 20px 50px #0006;overflow:hidden}
.home{display:grid;grid-template-columns:1.08fr .92fr;min-height:610px}.home-copy{padding:54px}.tag{display:inline-block;color:var(--gold);border:1px solid #ffd16655;background:#ffd16612;padding:7px 13px;border-radius:99px;font-weight:800}.home h2{font-size:51px;line-height:1.12;margin:18px 0}.home h2 em{font-style:normal;color:var(--orange);text-shadow:0 0 22px #ff7b4666}.home p{color:#bec9dc;font-size:18px;line-height:1.75}.settings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}.field label{display:block;color:var(--muted);font-size:13px;margin:0 0 7px}.field select,.field input{width:100%;padding:12px;border:1px solid #ffffff22;background:#0d1830;color:white;border-radius:12px}.start{border:0;padding:15px 28px;border-radius:14px;color:#291a10;background:linear-gradient(135deg,var(--gold),var(--orange));font-weight:900;font-size:18px;cursor:pointer;box-shadow:0 10px 25px #ff7b463d}.start:hover{transform:translateY(-2px)}.home-art{position:relative;display:grid;place-items:center;background:radial-gradient(circle,#394f7d,transparent 62%)}.castle{position:absolute;bottom:0;width:100%;height:36%;background:linear-gradient(135deg,transparent 20px,#0a1021 21px) 0 0/70px 70px;clip-path:polygon(0 45%,10% 45%,10% 15%,18% 15%,18% 55%,31% 55%,31% 0,42% 0,42% 60%,55% 60%,55% 26%,67% 26%,67% 58%,78% 58%,78% 8%,89% 8%,89% 48%,100% 48%,100% 100%,0 100%)}.hero-knight{position:relative;z-index:1;font-size:142px;filter:drop-shadow(0 18px 12px #0007);animation:float 2.5s ease-in-out infinite}.sword-glow{position:absolute;width:190px;height:190px;border:2px solid #ffd16644;border-radius:50%;box-shadow:0 0 70px #ffd16635}.monster-badge{position:absolute;right:8%;top:14%;background:#171c31;border:2px solid #ff7b46;border-radius:16px;padding:10px 13px;transform:rotate(6deg);font-weight:900}.leader-mini{margin-top:24px;border-top:1px solid #ffffff15;padding-top:17px}.leader-mini button{background:none;border:0;color:var(--gold);font-weight:800;cursor:pointer;padding:0}
.battle{min-height:690px;padding:20px}.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}.fighter{display:flex;align-items:center;gap:11px}.fighter.enemy{justify-content:flex-end;text-align:right}.avatar{font-size:37px}.name{font-weight:900}.level{font-size:12px;color:var(--gold)}.hp{height:13px;width:230px;max-width:30vw;background:#090f1d;border:2px solid #ffffff1b;border-radius:99px;overflow:hidden;margin-top:6px}.hp i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#31b978,#64e6af);transition:.4s}.enemy .hp i{background:linear-gradient(90deg,#ff9248,#ff4f63)}.timer{text-align:center;background:#0b1428;padding:10px 18px;border-radius:14px;border:1px solid #ffffff14}.timer b{font-size:25px;color:var(--gold)}.arena{height:270px;position:relative;display:flex;align-items:flex-end;justify-content:space-around;background:radial-gradient(ellipse at bottom,#41507a 0,#253557 38%,transparent 69%);border-bottom:2px solid #ffffff15}.character{font-size:112px;filter:drop-shadow(0 14px 8px #0007);transform-origin:bottom}.character.attack{animation:attack .45s}.character.hit{animation:hit .45s}.monster{font-size:126px}.damage{position:absolute;font-size:30px;font-weight:900;color:var(--gold);opacity:0}.damage.pop{animation:damage .8s}.stage{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:var(--muted);font-weight:800}.combo{position:absolute;right:20px;top:50px;color:var(--gold);font-size:20px;font-weight:900}.quiz{max-width:850px;margin:-4px auto 0;background:#111d35;border:1px solid #ffffff15;border-radius:20px;padding:22px}.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.meaning{text-align:center;font-size:21px;line-height:1.6;min-height:72px;display:grid;place-items:center;margin:10px}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.option{border:2px solid #ffffff17;background:#1c2b49;color:white;border-radius:13px;padding:13px 16px;text-align:left;font-size:17px;font-weight:800;cursor:pointer}.option:hover:not(:disabled){border-color:var(--gold);background:#263858}.option.correct{border-color:var(--mint);background:#164638}.option.wrong{border-color:var(--red);background:#522333}.option:disabled{cursor:default}.feedback{text-align:center;min-height:27px;margin-top:11px;font-weight:800}.next{display:none;margin:8px auto 0;border:0;border-radius:11px;padding:10px 20px;background:var(--gold);font-weight:900;cursor:pointer}
.result{padding:45px;text-align:center}.result h2{font-size:38px;margin:8px}.trophy{font-size:73px}.summary{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin:24px}.summary div{min-width:130px;background:#0d1830;border:1px solid #ffffff15;border-radius:16px;padding:15px}.summary b{font-size:27px;display:block;color:var(--gold)}.actions{display:flex;justify-content:center;gap:12px}.rankbox{max-width:760px;margin:28px auto 0;text-align:left}.rankbox h3{display:flex;justify-content:space-between}.rank-table{width:100%;border-collapse:collapse;background:#0d1830;border-radius:15px;overflow:hidden}.rank-table th,.rank-table td{padding:12px;border-bottom:1px solid #ffffff10}.rank-table th{color:var(--muted);font-size:13px}.rank-table tr.me{background:#ffd16618}.rank-num{color:var(--gold);font-weight:900}.back{border:1px solid #ffffff25;background:transparent;color:white;padding:13px 22px;border-radius:13px;font-weight:800;cursor:pointer}
@keyframes float{50%{transform:translateY(-12px)}}@keyframes attack{45%{transform:translateX(90px) rotate(8deg) scale(1.13)}}@keyframes hit{25%,75%{transform:translateX(-12px);filter:brightness(3) sepia(1) saturate(5)}}@keyframes damage{20%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-80px)}}@media(max-width:760px){.home{grid-template-columns:1fr}.home-art{min-height:280px;order:-1}.hero-knight{font-size:100px}.home-copy{padding:28px}.home h2{font-size:37px}.hud{grid-template-columns:1fr 1fr}.timer{grid-column:1/-1;grid-row:1}.hp{max-width:35vw}.arena{height:210px}.character{font-size:78px}.monster{font-size:90px}.options{grid-template-columns:1fr}.battle{padding:10px}.quiz{padding:15px}.result{padding:28px 12px}.rank-table th,.rank-table td{padding:9px 5px;font-size:13px}}
</style></head><body><div class="stars"></div><main class="app"><header class="top"><div class="logo"><div class="crest">⚔</div><div><h1>會考成語勇者傳說</h1><small>102～115 年會考冒險題庫</small></div></div><button class="icon-btn" id="sound">🔊 音效</button></header>
<section id="homeScreen" class="screen show card home"><div class="home-copy"><span class="tag">國文會考・知識冒險 RPG</span><h2>用成語之力，<br><em>擊退魔物！</em></h2><p>每答對一題就能揮劍攻擊；答錯則會被魔物反擊。以最高正確率和最短秒數，登上勇者排行榜！</p><div class="settings"><div class="field"><label>勇者名稱</label><input id="playerName" maxlength="10" value="成語勇者"></div><div class="field"><label>挑戰年份</label><select id="year"><option value="all">全部年度</option></select></div><div class="field"><label>冒險長度</label><select id="count"><option value="10">10 題・快速討伐</option><option value="20">20 題・魔王試煉</option></select></div><div class="field"><label>難度</label><select id="difficulty"><option value="normal">普通・四選一</option><option value="hard">困難・六選一</option></select></div></div><button id="start" class="start">⚔ 開始冒險</button><div class="leader-mini">🏆 已有 <span id="recordCount">0</span> 筆挑戰紀錄　<button id="showRank">查看排行榜 →</button></div></div><div class="home-art"><div class="sword-glow"></div><div class="hero-knight">🛡️</div><div class="monster-badge">史萊姆來襲！</div><div class="castle"></div></div></section>
<section id="battleScreen" class="screen card battle"><div class="hud"><div class="fighter"><div class="avatar">🧙</div><div><div class="name" id="heroName">成語勇者</div><div class="level">LV. 會考挑戰者</div><div class="hp"><i id="heroHp"></i></div></div></div><div class="timer">⏱ <b id="time">0.0</b> 秒</div><div class="fighter enemy"><div><div class="name" id="monsterName">成語史萊姆</div><div class="level" id="monsterLevel">第一關</div><div class="hp"><i id="monsterHp"></i></div></div><div class="avatar">👾</div></div></div><div class="arena"><div class="stage" id="stage">第 1 / 10 題</div><div class="combo" id="combo"></div><div class="character" id="hero">🧙‍♂️</div><div class="damage" id="damage">-20</div><div class="character monster" id="monster">👾</div></div><div class="quiz"><div class="qmeta"><span id="qyear">歷屆題庫</span><span>正確 <b id="correctNow">0</b> 題</span></div><div class="meaning" id="meaning"></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div><button class="next" id="next">繼續戰鬥 →</button></div></section>
<section id="resultScreen" class="screen card result"><div class="trophy" id="trophy">🏆</div><h2 id="resultTitle">討伐成功！</h2><p id="resultSub"></p><div class="summary"><div><b id="finalCorrect">0/10</b><small>答對題數</small></div><div><b id="finalAccuracy">0%</b><small>正確率</small></div><div><b id="finalTime">0 秒</b><small>完成時間</small></div><div><b id="finalRank">—</b><small>本次名次</small></div></div><div class="actions"><button class="start" id="again">再次挑戰</button><button class="back" id="homeBtn">返回首頁</button></div><div class="rankbox"><h3><span>🏆 勇者排行榜</span><small>正確率優先・秒數次之</small></h3><table class="rank-table"><thead><tr><th>名次</th><th>勇者</th><th>年份</th><th>正確率</th><th>秒數</th><th>日期</th></tr></thead><tbody id="rankBody"></tbody></table></div></section></main><script src="data.js"></script><script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let quiz=[],idx=0,correct=0,combo=0,locked=false,startAt=0,timerId,currentRecordId='',soundOn=true;const monsters=[['👾','成語史萊姆'],['👹','赤角鬼王'],['🐲','典故魔龍'],['🧟','錯字殭屍'],['🦹','混淆大魔王']];
function records(){return JSON.parse(localStorage.getItem('idiom-rpg-ranks')||'[]')}function saveRecords(x){localStorage.setItem('idiom-rpg-ranks',JSON.stringify(x.slice(0,50)))}function rankSort(a,b){return b.accuracy-a.accuracy||a.seconds-b.seconds||b.correct-a.correct}function shuffle(a){for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function show(id){$$('.screen').forEach(x=>x.classList.remove('show'));$(id).classList.add('show')}function beep(ok){if(!soundOn)return;try{let c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=ok?'triangle':'sawtooth';o.frequency.value=ok?620:130;g.gain.setValueAtTime(.07,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.start();o.stop(c.currentTime+.25)}catch(e){}}
for(let y=102;y<=115;y++){let o=document.createElement('option');o.value=y;o.textContent=y+' 年（'+IDIOMS.filter(x=>x.year==y).length+' 題）';if(!IDIOMS.some(x=>x.year==y))o.disabled=true;$('#year').append(o)}$('#recordCount').textContent=records().length;$('#sound').onclick=()=>{soundOn=!soundOn;$('#sound').textContent=soundOn?'🔊 音效':'🔇 靜音'};
function begin(){$('.summary').style.display='flex';$('.actions').style.display='flex';$('#again').style.display='';let y=$('#year').value,pool=y==='all'?IDIOMS:IDIOMS.filter(x=>x.year==y),n=+$(`#count`).value;if(!pool.length)return alert('這個年度沒有可用題目');quiz=shuffle([...pool]).slice(0,Math.min(n,pool.length));idx=correct=combo=0;locked=false;$('#heroName').textContent=$('#playerName').value.trim()||'無名勇者';startAt=performance.now();clearInterval(timerId);timerId=setInterval(()=>$('#time').textContent=((performance.now()-startAt)/1000).toFixed(1),100);show('#battleScreen');render()}
function render(){locked=false;let q=quiz[idx],m=monsters[Math.min(monsters.length-1,Math.floor(idx/(quiz.length/monsters.length)))];$('#monster').textContent=m[0];$('#monsterName').textContent=m[1];$('#monsterLevel').textContent=idx===quiz.length-1?'最終魔王':'第 '+(idx+1)+' 戰';$('#stage').textContent='第 '+(idx+1)+' / '+quiz.length+' 題';$('#heroHp').style.width=(100-(idx-correct)*20)+'%';$('#monsterHp').style.width=(100-idx/quiz.length*100)+'%';$('#meaning').textContent=q.meaning;$('#qyear').textContent=(q.year||'歷屆')+' 年度題庫';$('#correctNow').textContent=correct;$('#feedback').textContent='';$('#next').style.display='none';let amount=$('#difficulty').value==='hard'?6:4,opts=shuffle([q,...shuffle(IDIOMS.filter(x=>x.idiom!==q.idiom)).slice(0,amount-1)]);$('#options').innerHTML=opts.map((x,i)=>`<button class="option" data-v="${x.idiom}">${String.fromCharCode(65+i)}．${x.idiom}</button>`).join('');$$('.option').forEach(b=>b.onclick=()=>answer(b,q))}
function answer(btn,q){if(locked)return;locked=true;let ok=btn.dataset.v===q.idiom;$$('.option').forEach(b=>{b.disabled=true;if(b.dataset.v===q.idiom)b.classList.add('correct')});if(ok){correct++;combo++;$('#hero').classList.add('attack');$('#monster').classList.add('hit');$('#damage').textContent='-'+(20+combo*3);$('#damage').classList.add('pop');$('#feedback').textContent=combo>=2?'⚡ 答對！'+combo+' 連擊！':'⚔ 答對！攻擊成功！'}else{combo=0;btn.classList.add('wrong');$('#hero').classList.add('hit');$('#monster').classList.add('attack');$('#feedback').textContent='💥 遭到反擊！正解：'+q.idiom}beep(ok);$('#combo').textContent=combo>=2?'🔥 '+combo+' COMBO':'';$('#correctNow').textContent=correct;setTimeout(()=>{$$('.character').forEach(x=>x.classList.remove('attack','hit'));$('#damage').classList.remove('pop')},550);$('#next').style.display='block'}
$('#next').onclick=()=>{idx++;idx>=quiz.length?finish():render()};function finish(){clearInterval(timerId);let seconds=+((performance.now()-startAt)/1000).toFixed(1),accuracy=Math.round(correct/quiz.length*100),r={id:Date.now().toString(),name:$('#playerName').value.trim()||'無名勇者',year:$('#year').value==='all'?'全部':$('#year').value,correct,total:quiz.length,accuracy,seconds,date:new Date().toLocaleDateString('zh-TW')};currentRecordId=r.id;let all=[...records(),r].sort(rankSort);saveRecords(all);let rank=all.findIndex(x=>x.id===r.id)+1;$('#trophy').textContent=accuracy>=90?'🏆':accuracy>=70?'⚔️':'🛡️';$('#resultTitle').textContent=accuracy>=90?'傳說勇者，完美討伐！':accuracy>=70?'魔物退散，冒險成功！':'整裝再戰，勇者不退！';$('#resultSub').textContent='本次成績已自動登錄排行榜';$('#finalCorrect').textContent=correct+'/'+quiz.length;$('#finalAccuracy').textContent=accuracy+'%';$('#finalTime').textContent=seconds+' 秒';$('#finalRank').textContent='# '+rank;drawRank();show('#resultScreen');$('#recordCount').textContent=records().length}
function drawRank(){let all=records().sort(rankSort).slice(0,10);$('#rankBody').innerHTML=all.length?all.map((r,i)=>`<tr class="${r.id===currentRecordId?'me':''}"><td class="rank-num">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</td><td>${r.name}</td><td>${r.year}</td><td>${r.accuracy}%</td><td>${r.seconds}</td><td>${r.date}</td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:#9dadc9">尚無紀錄，等你成為第一位勇者！</td></tr>'}
$('#start').onclick=begin;$('#again').onclick=begin;$('#homeBtn').onclick=()=>show('#homeScreen');$('#showRank').onclick=()=>{currentRecordId='';drawRank();$('#resultTitle').textContent='勇者排行榜';$('#resultSub').textContent='正確率越高、完成時間越短，排名越前面！';$('.summary').style.display='none';$('.actions').style.display='flex';$('#again').style.display='none';show('#resultScreen')};
</script></body></html>
